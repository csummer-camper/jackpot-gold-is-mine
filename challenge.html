<DOCTYPE html>
<html>
<head>
<title>dream vacation
</title>
<style>
        @keyframes rainbow {
            
        
        0%{
            color:red;
        }
        25%{
            color: orange;
        }
        50%{
            color: yellowgreen;

        }
        75%{
            color:green ;
        }
        100%{
            color: rgb(0, 255, 225);
        }
     }
     .rainbow{
     animation: rainbow 5s infinite;
     }
</style>
</head>
<body>
<h1 class="rainbow">Dream vacation:Hawaii</h1>
    
</body>
</html>
